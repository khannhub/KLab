name: Portainer GitOps (Webhook)

on:
  push:
    branches:
      - main
    paths:
      - stacks/*/docker-compose.yml

permissions:
  contents: read

concurrency:
  group: portainer-gitops-webhook-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed stacks
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [[ -z "${base}" || "${base}" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed_stacks_json=[]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          files="$(git diff --name-only "${base}" "${head}" -- 'stacks/*/docker-compose.yml' || true)"

          if [[ -z "${files}" ]]; then
            echo "changed_stacks_json=[]" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          stacks_json="$(
            printf '%s\n' "${files}" \
              | awk -F/ 'NF >= 3 { print $2 }' \
              | sort -u \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )"

          # Validate the generated JSON
          if ! echo "${stacks_json}" | jq empty 2>/dev/null; then
            echo "Error: Failed to generate valid JSON for changed stacks"
            echo "Generated value: ${stacks_json}"
            exit 1
          fi

          echo "changed_stacks_json=${stacks_json}" >> "${GITHUB_OUTPUT}"

      - name: Trigger Portainer webhooks
        if: steps.changes.outputs.changed_stacks_json != '[]'
        shell: bash
        env:
          CHANGED_STACKS_JSON: ${{ steps.changes.outputs.changed_stacks_json }}
          PORTAINER_WEBHOOKS_JSON: ${{ secrets.PORTAINER_WEBHOOKS }}
        run: |
          set -euo pipefail

          if [[ -z "${PORTAINER_WEBHOOKS_JSON}" || "${PORTAINER_WEBHOOKS_JSON}" == "null" ]]; then
            echo "PORTAINER_WEBHOOKS secret not set; skipping Portainer webhook trigger."
            exit 0
          fi

          # Validate JSON inputs
          if ! echo "${CHANGED_STACKS_JSON}" | jq empty 2>/dev/null; then
            echo "Error: CHANGED_STACKS_JSON is not valid JSON"
            echo "Value: ${CHANGED_STACKS_JSON}"
            exit 1
          fi

          if ! echo "${PORTAINER_WEBHOOKS_JSON}" | jq empty 2>/dev/null; then
            echo "Error: PORTAINER_WEBHOOKS secret is not valid JSON"
            echo "Please verify the secret format. Expected: {\"stack-name\": \"webhook-url\", ...}"
            jq . <<< "${PORTAINER_WEBHOOKS_JSON}" 2>&1 || true
            exit 1
          fi

          echo "${CHANGED_STACKS_JSON}" | jq -r '.[]' | while IFS= read -r stack; do
            url="$(jq -r --arg stack "${stack}" '.[$stack] // empty' <<< "${PORTAINER_WEBHOOKS_JSON}")"

            if [[ -z "${url}" || "${url}" == "null" ]]; then
              echo "No Portainer webhook configured for stack '${stack}' (missing key in PORTAINER_WEBHOOKS); skipping."
              continue
            fi

            echo "Triggering Portainer GitOps webhook for stack '${stack}'..."
            curl -fsS -X POST --retry 3 --retry-all-errors --max-time 20 "${url}"
          done

      - name: Skip (no matching stack compose changes)
        if: steps.changes.outputs.changed_stacks_json == '[]'
        run: echo "No stacks/*/docker-compose.yml changes detected; nothing to trigger."
