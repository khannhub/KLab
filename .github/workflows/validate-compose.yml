name: CI

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
      - .yamllint.yml
      - stacks/**
      - scripts/**
      - Makefile
  pull_request:
    paths:
      - .github/workflows/**
      - .github/dependabot.yml
      - .yamllint.yml
      - stacks/**
      - scripts/**
      - Makefile

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows (actionlint)
        uses: raven-actions/actionlint@v2

      - name: Lint YAML (yamllint)
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github stacks
          config_file: .yamllint.yml
          format: parsable
          strict: true

      - name: Shellcheck scripts
        run: |
          if command -v shellcheck >/dev/null 2>&1; then
            echo "shellcheck already installed"
          else
            echo "shellcheck not found; installing"
            sudo apt-get update
            sudo apt-get install -y shellcheck
          fi
          shellcheck scripts/*.sh

      - name: Validate stacks
        run: bash scripts/stack.sh validate

      - name: Validate .env.example completeness
        run: |
          set -euo pipefail

          failed=0

          # Find all docker-compose.yml files
          while IFS= read -r compose_file; do
            stack_dir="$(dirname "${compose_file}")"
            stack_name="$(basename "${stack_dir}")"
            env_example="${stack_dir}/.env.example"

            # Skip template and stacks without .env.example
            if [[ "${stack_name}" == "_template" ]] || [[ ! -f "${env_example}" ]]; then
              continue
            fi

            echo "Checking ${stack_name}..."

            # Extract required environment variables from docker-compose.yml
            # Look for patterns like ${VAR:?message} or ${VAR:?set VAR in .env}
            required_vars="$(
              grep -oE '\$\{[A-Z_][A-Z0-9_]*:\?[^}]*\}' "${compose_file}" 2>/dev/null | \
              sed -E 's/\$\{([A-Z_][A-Z0-9_]*):\?[^}]*\}/\1/' | \
              sort -u || true
            )"

            # Extract environment variable names from .env.example
            # Skip comments and empty lines
            env_vars="$(
              grep -vE '^[[:space:]]*#|^[[:space:]]*$' "${env_example}" 2>/dev/null | \
              cut -d= -f1 | \
              sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
              sort -u || true
            )"

            # Check if all required vars are documented
            missing_vars=""
            while IFS= read -r var; do
              [[ -z "${var}" ]] && continue
              if ! echo "${env_vars}" | grep -q "^${var}$"; then
                missing_vars="${missing_vars}${missing_vars:+ }${var}"
              fi
            done <<< "${required_vars}"

            if [[ -n "${missing_vars}" ]]; then
              echo "Missing required variables in .env.example: ${missing_vars}"
              failed=1
            else
              echo "  ✓ All required variables documented"
            fi
          done < <(find stacks -name "docker-compose.yml" -type f | sort)

          if [[ "${failed}" -eq 1 ]]; then
            echo ""
            echo "Some stacks have missing required variables in .env.example files."
            echo "Required variables (using \${VAR:?message} syntax) must be documented in .env.example"
            exit 1
          fi

          echo ""
          echo "✓ All stacks have complete .env.example files"
